<style>
*{
box-sizing:border-box;
}

body{
font-family:"Segoe UI","Microsoft JhengHei",Arial,sans-serif;
margin:0;
background:linear-gradient(135deg,#eef2f7,#f8fbff);
color:#333;
transition:none;
}

/* ===== 工作區 ===== */

.container{
max-width:1100px;
margin:35px auto;
padding:30px 40px;
background:white;
border-radius:16px;
box-shadow:0 12px 40px rgba(0,0,0,0.08);
}

textarea.dragover{
background:#eef4ff;
border-color:#6fa2ff;
}

/* ===== 標題列 ===== */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:0px;
}

h1{
margin-top:0;
font-size:24px;
font-weight:600;
color:#2d3a4b;
letter-spacing:0.3px;
}

.line{
display:flex;
align-items:center;
gap:6px;
}

/* ===== 文字框 ===== */

textarea{
width:100%;
height:260px;
font-size:19px;
padding:14px;
border-radius:10px;
border:1px solid #d7dce6;
resize:vertical;
background:#fafbff;
transition:.2s;
}

textarea:focus{
outline:none;
border-color:#5b8cff;
background:white;
box-shadow:0 0 0 3px rgba(91,140,255,0.15);
}

/* ===== 區塊 ===== */

.section{
margin-top:20px;
}

.section b{
display:block;
margin-bottom:6px;
color:#444;
font-size:16px;
}

/* ===== 按鈕 ===== */

button{
padding:9px 16px;
margin:6px 6px 6px 0;
font-size:16px;
border-radius:8px;
border:1px solid #d0d7e2;
background:#f7f9fc;
cursor:pointer;
transition:.15s;
}

button:hover{
background:#eaf0ff;
border-color:#5b8cff;
color:#2f5be3;
}

button.primary{
background:#5b8cff;
border-color:#5b8cff;
color:white;
}

button.primary:hover{
background:#4b78e6;
}

/* ===== checkbox ===== */

label{
font-size:16px;
color:#555;
}

input[type="checkbox"]{
margin-right:5px;
}

/* ===== 深色模式（柔和版） ===== */

body.dark{
background:#1a1d22;
color:#e6e8eb;
}

body.dark .container{
background:#23272f;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

body.dark textarea{
background:#1f232a;
border-color:#3a404a;
color:#f1f1f1;
}

body.dark textarea:focus{
border-color:#6fa2ff;
box-shadow:0 0 0 3px rgba(111,162,255,0.2);
}

body.dark button{
background:#2c313a;
border-color:#444b57;
color:#e3e3e3;
}

body.dark button:hover{
background:#3a404c;
border-color:#6fa2ff;
color:#ffffff;
}

body.dark label{
color:#cfd3d8;
}

body.dark .section b{
color:#e3e5e8;
}

body.dark textarea.dragover{
background:#2b3140;
border-color:#6fa2ff;
}

body.dark button.primary{
background:#4c6fb3;
border-color:#4c6fb3;
color:#ffffff;
}

body.dark button.primary:hover{
background:#5b80c9;
border-color:#5b80c9;
}

body.dark h1{
color:#e9edf3;
letter-spacing:0.3px;
}

/* ===== 手機版 ===== */

@media (max-width:800px){

.container{
margin:10px;
padding:20px;
border-radius:12px;
}

textarea{
height:200px;
font-size:15px;
}

button{
font-size:13px;
padding:8px 12px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:0px;
}

}

<body>

<div class="container wide">
<div class="topbar">
<h1>繁簡轉換工具</h1>
<button id="themeToggle">☀️ 淺色背景</button>
</div>
<textarea id="input" placeholder="貼上文字..."></textarea>

<div class="section">

<button class="primary" onclick="convert('t','cn')">繁體 → 簡體</button>
<button class="primary" onclick="convert('cn','t')">簡體 → 繁體</button> 
<button onclick="pasteFromClipboard()">剪貼簿複製到輸入</button>
<label>
    <input type="checkbox" id="pasteAppend">
    附加貼上
</label>
<button style="float: right; margin-left: 10px;" onclick="clearInput()">清空輸入</button>
<br>
<button onclick="fixGbkDisplayedAsBig5()">修復GBK亂碼 → 簡體</button>
<button onclick="fixBig5DisplayedAsGbk()">修復BIG5亂碼 → 繁體</button>
<label>
    <input type="checkbox" id="useCustomFixMap" checked>
    修復時套用自定義修復表
</label>

<br>

<button onclick="copyOutputToClipboard()">輸出複製到剪貼簿</button>
<button onclick="swapInputOutput()">↕內容互換</button>
<button style="float: right; margin-left: 10px;" onclick="clearOutput()">清空輸出</button>
</div>
<br>
<textarea id="output" placeholder="結果..."></textarea>

<script>

function fixPUA(str){

for(const k in puaMap){
str = str.split(k).join(puaMap[k])
}

return str
}

// 修復表：PUA → 正確字（可自行擴充）
const puaFixMap = {
    "\uE000": "．",
    "\uE001": "、",
    "\uE002": "。",
    "\uE003": "．",
    "\uE004": "○",
    "\uE005": "●",
    "\uE006": "◎",
    "\uE007": "☆",
    "\uE008": "★",
    "\uE009": "◇",
    "\uE00A": "◆",
    "\uE00B": "□",
    "\uE00C": "■",
    "\uE00D": "△",
    "\uE00E": "▲",
    "\uE00F": "▽",
    "\uE010": "▼",
    "\uE011": "※",
    "\uE012": "→",
    "\uE013": "←",
    "\uE014": "↑",
    "\uE015": "↓",
    "\uE016": "↔",
    "\uE017": "‧",
    "\uE018": "—",
    "\uE019": "–",
    "\uE01A": "―",
    "\uE01B": "…",
    "\uE707": "器",
    "\uF707": "器",
    "\uE5D0": "龜",
	"\uE5D1": "龜",
    "\uE7C9": "臺",
	"\uE7CA": "台",
    "\uF849": "蔣",
    "\uF8A1": "，",
    "\uF8A2": "。",
    "\uF8A3": "、",
    "\uF8A4": "；",
    "\uF8A5": "：",
    "\uF8A6": "？",
    "\uF8A7": "！",
    "\uF8A8": "⋯",
    "\uF8A9": "……",
    "\uF8AA": "—",
    "\uF8AB": "–",
    "\uF8AC": "―",
    "\uF8AD": "…",
    // 更多可從 HKSCS-2008 PUA mapping 補
	// 來源是黑暗執行緒部落格 + PTT/巴哈姆特 等台灣社群常見補丁
};

// 檢查單一字元是否能安全用 Big5 編碼（round-trip 不變）
function canEncodeInBig5(char) {
    try {
        const bytes = iconv.encode(char, "big5");
        const back = iconv.decode(bytes, "big5");
        return back === char;
    } catch {
        return false;
    }
}


let OpenCCLib

window.onload=()=>{
OpenCCLib=window.OpenCC
}

/* 簡易的繁簡轉換 */
function convert(from,to){
const input=document.getElementById("input").value
if(!input) return
const converter=OpenCCLib.Converter({from:from,to:to})
const result=converter(input)
document.getElementById("output").value=result
}


// GBK 被當 Big5 解讀顯示亂碼 → 修復成正確簡體
function fixGbkDisplayedAsBig5() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const useCustomFix = document.getElementById("useCustomFixMap").checked;

    let output = '';

    if (!useCustomFix) {
        // 沒勾選 → 簡單直接轉
        try {
            const bytes = iconv.encode(input, "big5");
            output = iconv.decode(bytes, "gbk");
        } catch {
            output = input; // 失敗就保留原樣
        }
    } else {
        // 勾選 → 分段 + 逐段處理 + 套修復表
        const segments = [];
        let current = '';
        let currentEncodable = true;

        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const encodable = canEncodeInBig5(char);
            if (encodable !== currentEncodable && current) {
                segments.push({ text: current, encodable: currentEncodable });
                current = '';
            }
            current += char;
            currentEncodable = encodable;
        }
        if (current) {
            segments.push({ text: current, encodable: currentEncodable });
        }

        for (const seg of segments) {
            if (seg.encodable) {
                try {
                    const bytes = iconv.encode(seg.text, "big5");
                    output += iconv.decode(bytes, "gbk");
                } catch {
                    output += seg.text;
                }
            } else {
                // 不可編碼區段 → 套修復表
                let fixed = '';
                for (const char of seg.text) {
                    fixed += puaFixMap[char] || char;
                }
                output += fixed;
            }
        }
    }

    document.getElementById("output").value = output;
}


// 亂碼修復 - Big5 被當成 GBK 解讀後顯示亂碼
function fixBig5DisplayedAsGbk() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const useCustomFix = document.getElementById("useCustomFixMap").checked;

    let output = '';

    if (!useCustomFix) {
        // 沒勾選 → 簡單直接轉
        try {
            const bytes = iconv.encode(input, "gbk");
            output = iconv.decode(bytes, "big5");
        } catch {
            output = input;
        }
    } else {
        // 勾選 → 分段 + 逐段處理 + 套修復表
        const segments = [];
        let current = '';
        let currentEncodable = true;

        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const encodable = canEncodeInBig5(char);
            if (encodable !== currentEncodable && current) {
                segments.push({ text: current, encodable: currentEncodable });
                current = '';
            }
            current += char;
            currentEncodable = encodable;
        }
        if (current) {
            segments.push({ text: current, encodable: currentEncodable });
        }

        for (const seg of segments) {
            if (seg.encodable) {
                try {
                    const bytes = iconv.encode(seg.text, "gbk");
                    output += iconv.decode(bytes, "big5");
                } catch {
                    output += seg.text;
                }
            } else {
                // 不可編碼區段 → 套修復表
                let fixed = '';
                for (const char of seg.text) {
                    fixed += puaFixMap[char] || char;
                }
                output += fixed;
            }
        }
    }

    document.getElementById("output").value = output;
}


/* 複製 */
function copyOutputToClipboard() {
    const outputEl = document.getElementById("output");
    const text = outputEl.value.trim();
    
    if (!text) return;
    
    const btn = event.target;           // 取得被點的按鈕
    const originalText = btn.textContent;
    
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "已複製到剪貼簿 ✓";
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
        }, 1200);
    }).catch(() => {
        btn.textContent = "複製失敗";
        setTimeout(() => { btn.textContent = originalText; }, 2000);
    });
}


// 清空輸入框
function clearInput() {
    document.getElementById("input").value = "";
}

// 清空輸出框
function clearOutput() {
    document.getElementById("output").value = "";
}

// 輸入與輸出內容互換
function swapInputOutput() {
    const inputEl  = document.getElementById("input");
    const outputEl = document.getElementById("output");
    
    const temp = inputEl.value;
    inputEl.value  = outputEl.value;
    outputEl.value = temp;
}

// 從剪貼簿貼到輸入框（支援附加 / 覆蓋）
function pasteFromClipboard() {
    const inputEl = document.getElementById("input");
    const appendMode = document.getElementById("pasteAppend").checked;
    const btn = event.target;  // 用來做反饋
    const originalText = btn.textContent;

    // 先試舊的 execCommand 方式（觸發確認彈窗的機率較低）
    const tempTextarea = document.createElement("textarea");
    tempTextarea.style.position = "fixed";
    tempTextarea.style.opacity = "0";
    tempTextarea.style.left = "-9999px";
    document.body.appendChild(tempTextarea);

    tempTextarea.focus();
    tempTextarea.select();

    let pastedText = "";
    let success = false;

    try {
        success = document.execCommand("paste");
        if (success) {
            pastedText = tempTextarea.value.trim();
        }
    } catch (e) {
        console.warn("execCommand paste 失敗:", e);
    }

    document.body.removeChild(tempTextarea);

    if (success && pastedText) {
        // 成功了，直接處理
        applyPastedText(pastedText, inputEl, appendMode, btn, originalText);
        return;
    }

    // 如果 execCommand 失敗 → fallback 到 Clipboard API
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText()
            .then(text => {
                if (text.trim()) {
                    applyPastedText(text.trim(), inputEl, appendMode, btn, originalText);
                } else {
                    showFeedback(btn, "剪貼簿空的", originalText);
                }
            })
            .catch(err => {
                console.error("Clipboard API 失敗:", err);
                showFeedback(btn, "貼上失敗", originalText);
                alert("無法自動讀取剪貼簿，請用 Ctrl+V 手動貼上。\n（瀏覽器安全限制，可能需點擊確認彈窗）");
            });
    } else {
        showFeedback(btn, "瀏覽器不支援", originalText);
        alert("你的瀏覽器不支援自動貼上，請用 Ctrl+V。");
    }
}

// 處理貼上文字 + 反饋
function applyPastedText(text, inputEl, appendMode, btn, originalText) {
    if (appendMode) {
        inputEl.value += (inputEl.value ? "\n" : "") + text;
    } else {
        inputEl.value = text;
    }

    inputEl.focus();
    inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);

    showFeedback(btn, "已貼上 ✓", originalText);
}

function showFeedback(btn, msg, originalText) {
    btn.textContent = msg;
    setTimeout(() => { btn.textContent = originalText; }, 1200);
}

/* 深淺色模式切換 */

const themeBtn=document.getElementById("themeToggle")

function setTheme(mode){
if(mode==="dark"){
document.body.classList.add("dark")
themeBtn.textContent="🌙 深色背景"
}else{
document.body.classList.remove("dark")
themeBtn.textContent="☀️ 淺色背景"
}
localStorage.setItem("theme",mode)
}

themeBtn.onclick=()=>{
const isDark=document.body.classList.contains("dark")
setTheme(isDark?"light":"dark")
}

/* 載入時恢復主題 */

window.addEventListener("load",()=>{
const saved=localStorage.getItem("theme")
if(saved==="dark"){
setTheme("dark")
}
})

/* 拖曳貼上（任何檔案都嘗試讀文字） */

const inputBox = document.getElementById("input")

inputBox.addEventListener("dragover",(e)=>{
e.preventDefault()
inputBox.classList.add("dragover")
})

inputBox.addEventListener("dragleave",()=>{
inputBox.classList.remove("dragover")
})

inputBox.addEventListener("drop",(e)=>{
e.preventDefault()
inputBox.classList.remove("dragover")

const append = document.getElementById("pasteAppend").checked

/* 1. 如果有檔案 */

if(e.dataTransfer.files && e.dataTransfer.files.length){

const file = e.dataTransfer.files[0]
const reader = new FileReader()

reader.onload = function(ev){

const text = ev.target.result

if(append){
inputBox.value += (inputBox.value ? "\n" : "") + text
}else{
inputBox.value = text
}

}

reader.readAsText(file)

return
}

/* 2. 如果是拖文字 */

const text = e.dataTransfer.getData("text")

if(text){

if(append){
inputBox.value += (inputBox.value ? "\n" : "") + text
}else{
inputBox.value = text
}

}

})

</script>

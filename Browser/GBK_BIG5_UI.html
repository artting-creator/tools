str = str.split(k).join(puaMap[k])
}

return str
}

// 修復表：PUA → 正確字（可自行擴充）
const puaFixMap = {
    "\uE000": "．",
    "\uE001": "、",
    "\uE002": "。",
    "\uE003": "．",

    "\uF8AA": "—",
    "\uF8AB": "–",
    "\uF8AC": "―",
    "\uF8AD": "…",
    // 更多可從 HKSCS-2008 PUA mapping 補
	// 來源是黑暗執行緒部落格 + PTT/巴哈姆特 等台灣社群常見補丁
};

// 檢查單一字元是否能安全用 Big5 編碼（round-trip 不變）
function canEncodeInBig5(char) {
    try {
        const bytes = iconv.encode(char, "big5");
        const back = iconv.decode(bytes, "big5");
        return back === char;
    } catch {
        return false;
    }
}


let OpenCCLib

window.onload=()=>{
OpenCCLib=window.OpenCC
}

/* 簡易的繁簡轉換 */
function convert(from,to){
const input=document.getElementById("input").value
if(!input) return
const converter=OpenCCLib.Converter({from:from,to:to})
const result=converter(input)
document.getElementById("output").value=result
}


// GBK 被當 Big5 解讀顯示亂碼 → 修復成正確簡體
function fixGbkDisplayedAsBig5() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const useCustomFix = document.getElementById("useCustomFixMap").checked;

    let output = '';

    if (!useCustomFix) {
        // 沒勾選 → 簡單直接轉
        try {
            const bytes = iconv.encode(input, "big5");
            output = iconv.decode(bytes, "gbk");
        } catch {
            output = input; // 失敗就保留原樣
        }
    } else {
        // 勾選 → 分段 + 逐段處理 + 套修復表
        const segments = [];
        let current = '';
        let currentEncodable = true;

        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const encodable = canEncodeInBig5(char);
            if (encodable !== currentEncodable && current) {
                segments.push({ text: current, encodable: currentEncodable });
                current = '';
            }
            current += char;
            currentEncodable = encodable;
        }
        if (current) {
            segments.push({ text: current, encodable: currentEncodable });
        }

        for (const seg of segments) {
            if (seg.encodable) {
                try {
                    const bytes = iconv.encode(seg.text, "big5");
                    output += iconv.decode(bytes, "gbk");
                } catch {
                    output += seg.text;
                }
            } else {
                // 不可編碼區段 → 套修復表
                let fixed = '';
                for (const char of seg.text) {
                    fixed += puaFixMap[char] || char;
                }
                output += fixed;
            }
        }
    }

    document.getElementById("output").value = output;
}


// 亂碼修復 - Big5 被當成 GBK 解讀後顯示亂碼
function fixBig5DisplayedAsGbk() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const useCustomFix = document.getElementById("useCustomFixMap").checked;

    let output = '';

    if (!useCustomFix) {
        // 沒勾選 → 簡單直接轉
        try {
            const bytes = iconv.encode(input, "gbk");
            output = iconv.decode(bytes, "big5");
        } catch {
            output = input;
        }
    } else {
        // 勾選 → 分段 + 逐段處理 + 套修復表
        const segments = [];
        let current = '';
        let currentEncodable = true;

        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const encodable = canEncodeInBig5(char);
            if (encodable !== currentEncodable && current) {
                segments.push({ text: current, encodable: currentEncodable });
                current = '';
            }
            current += char;
            currentEncodable = encodable;
        }
        if (current) {
            segments.push({ text: current, encodable: currentEncodable });
        }

        for (const seg of segments) {
            if (seg.encodable) {
                try {
                    const bytes = iconv.encode(seg.text, "gbk");
                    output += iconv.decode(bytes, "big5");
                } catch {
                    output += seg.text;
                }
            } else {
                // 不可編碼區段 → 套修復表
                let fixed = '';
                for (const char of seg.text) {
                    fixed += puaFixMap[char] || char;
                }
                output += fixed;
            }
        }
    }

    document.getElementById("output").value = output;
}


/* 複製 */
function copyOutputToClipboard() {
    const outputEl = document.getElementById("output");
    const text = outputEl.value.trim();
    
    if (!text) return;
    
    const btn = event.target;           // 取得被點的按鈕
    const originalText = btn.textContent;
    
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = t("clipboardCopy");
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
        }, 1200);
    }).catch(() => {
        btn.textContent = "複製失敗";
        setTimeout(() => { btn.textContent = originalText; }, 2000);
    });
}


// 清空輸入框
function clearInput() {
    document.getElementById("input").value = "";
}

// 清空輸出框
function clearOutput() {
    document.getElementById("output").value = "";
}

// 輸入與輸出內容互換
function swapInputOutput() {
    const inputEl  = document.getElementById("input");
    const outputEl = document.getElementById("output");
    
    const temp = inputEl.value;
    inputEl.value  = outputEl.value;
    outputEl.value = temp;
}

// 從剪貼簿貼到輸入框（支援附加 / 覆蓋）
function pasteFromClipboard() {
    const inputEl = document.getElementById("input");
    const appendMode = document.getElementById("pasteAppend").checked;
    const btn = event.target;  // 用來做反饋
    const originalText = btn.textContent;

    // 先試舊的 execCommand 方式（觸發確認彈窗的機率較低）
    const tempTextarea = document.createElement("textarea");
    tempTextarea.style.position = "fixed";
    tempTextarea.style.opacity = "0";
    tempTextarea.style.left = "-9999px";
    document.body.appendChild(tempTextarea);

    tempTextarea.focus();
    tempTextarea.select();

    let pastedText = "";
    let success = false;

    try {
        success = document.execCommand("paste");
        if (success) {
            pastedText = tempTextarea.value.trim();
        }
    } catch (e) {
        console.warn("execCommand paste 失敗:", e);
    }

    document.body.removeChild(tempTextarea);

    if (success && pastedText) {
        // 成功了，直接處理
        applyPastedText(pastedText, inputEl, appendMode, btn, originalText);
        return;
    }

    // 如果 execCommand 失敗 → fallback 到 Clipboard API
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText()
            .then(text => {
                if (text.trim()) {
                    applyPastedText(text.trim(), inputEl, appendMode, btn, originalText);
                } else {
                    showFeedback(btn, t("clipboardEmpty"), originalText);
                }
            })
            .catch(err => {
                console.error("Clipboard API 失敗:", err);
                showFeedback(btn, t("pasteFailed"), originalText);
                alert(t("clipboardReadFail"));
            });
    } else {
        showFeedback(btn, t("browserNotSupported"), originalText);
        alert(t("clipboardNoSupport"));
    }
}

// 處理貼上文字 + 反饋
function applyPastedText(text, inputEl, appendMode, btn, originalText) {
    if (appendMode) {
        inputEl.value += (inputEl.value ? "\n" : "") + text;
    } else {
        inputEl.value = text;
    }

    inputEl.focus();
    inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);

    showFeedback(btn, t("clipboardPaste"), originalText);
}

function showFeedback(btn, msg, originalText) {
    btn.textContent = msg;
    setTimeout(() => { btn.textContent = originalText; }, 1200);
}

/* 深淺色模式切換 */

const themeBtn=document.getElementById("themeToggle")

function setTheme(mode){

if(mode==="dark"){
document.body.classList.add("dark")
}else{
document.body.classList.remove("dark")
}

localStorage.setItem("theme",mode)

updateI18n()

}

themeBtn.onclick=()=>{
const isDark=document.body.classList.contains("dark")
setTheme(isDark?"light":"dark")
}


/* 拖曳貼上（任何檔案都嘗試讀文字） */

const inputBox = document.getElementById("input")

inputBox.addEventListener("dragover",(e)=>{
e.preventDefault()
inputBox.classList.add("dragover")
})

inputBox.addEventListener("dragleave",()=>{
inputBox.classList.remove("dragover")
})

inputBox.addEventListener("drop",(e)=>{
e.preventDefault()
inputBox.classList.remove("dragover")

const append = document.getElementById("pasteAppend").checked

/* 1. 如果有檔案 */

if(e.dataTransfer.files && e.dataTransfer.files.length){

const file = e.dataTransfer.files[0]
const reader = new FileReader()

reader.onload = function(ev){

const text = ev.target.result

if(append){
inputBox.value += (inputBox.value ? "\n" : "") + text
}else{
inputBox.value = text
}

}

reader.readAsText(file)

return
}

/* 2. 如果是拖文字 */

const text = e.dataTransfer.getData("text")

if(text){

if(append){
inputBox.value += (inputBox.value ? "\n" : "") + text
}else{
inputBox.value = text
}

}

})

function setLang(lang){
localStorage.setItem("lang", lang)
updateI18n()
}

const langSelect=document.getElementById("langSelect")

langSelect.onchange=()=>{
setLang(langSelect.value)
}

/* 載入時恢復語言和主題 */

window.addEventListener("load",()=>{

const savedLang = localStorage.getItem("lang") || "zh-TW"
langSelect.value = savedLang

const savedTheme = localStorage.getItem("theme")
if(savedTheme==="dark"){
document.body.classList.add("dark")
}

updateI18n()

})

function updateI18n(){

const lang = localStorage.getItem("lang") || "zh-TW"
const mode = document.body.classList.contains("dark") ? "dark" : "light"

document.querySelectorAll("[data-i18n]").forEach(el=>{

const key = el.dataset.i18n
let text = i18n[lang]?.[key]

if(typeof text === "object"){
text = text[mode]
}

if(text !== undefined){
el.textContent = text
}

})

document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{

const key = el.dataset.i18nPlaceholder
const text = i18n[lang]?.[key]

if(text !== undefined){
el.placeholder = text
}

})

}

const missingI18n = new Set()
function t(key){

const lang = localStorage.getItem("lang") || "zh-TW"

const dict = i18n[lang] || {}

let text = dict[key]

if(text === undefined){

const id = lang+":"+key

if(!missingI18n.has(id)){
console.warn("⚠ missing i18n key:", key, "(lang:",lang+")")
missingI18n.add(id)
}

return key

}

if(typeof text === "object"){

const mode = document.body.classList.contains("dark") ? "dark" : "light"

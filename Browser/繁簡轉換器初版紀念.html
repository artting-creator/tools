    套用自定義修復表（處理 PUA / 造字 / 特殊符號）
  </label>
<br>
<button onclick="fixGbkDisplayedAsBig5()">GBK被當BIG5亂碼 → 修成簡體GBK</button> <button onclick="fixBig5DisplayedAsGbk()">BIG5被當GBK亂碼 → 修成繁體BIG5</button>
<br>

<button onclick="copyOutputToClipboard()">複製輸出結果</button>

</div>

<script>

function fixPUA(str){

for(const k in puaMap){
str = str.split(k).join(puaMap[k])
}

return str
}

// 修復表：PUA → 正確字（可自行擴充）
const puaFixMap = {
    "\uE000": "．",
    "\uE001": "、",
    "\uE002": "。",
    "\uE003": "．",
    "\uE004": "○",
    "\uE005": "●",
    "\uE006": "◎",
    "\uE007": "☆",
    "\uE008": "★",
    "\uE009": "◇",
    "\uE00A": "◆",
    "\uE00B": "□",
    "\uE00C": "■",
    "\uE00D": "△",
    "\uE00E": "▲",
    "\uE00F": "▽",
    "\uE010": "▼",
    "\uE011": "※",
    "\uE012": "→",
    "\uE013": "←",
    "\uE014": "↑",
    "\uE015": "↓",
    "\uE016": "↔",
    "\uE017": "‧",
    "\uE018": "—",
    "\uE019": "–",
    "\uE01A": "―",
    "\uE01B": "…",
    "\uE707": "器",
    "\uF707": "器",
    "\uE5D0": "龜",
	"\uE5D1": "龜",
    "\uE7C9": "臺",
	"\uE7CA": "台",
    "\uF849": "蔣",
    "\uF8A1": "，",
    "\uF8A2": "。",
    "\uF8A3": "、",
    "\uF8A4": "；",
    "\uF8A5": "：",
    "\uF8A6": "？",
    "\uF8A7": "！",
    "\uF8A8": "⋯",
    "\uF8A9": "……",
    "\uF8AA": "—",
    "\uF8AB": "–",
    "\uF8AC": "―",
    "\uF8AD": "…",
    // 更多可從 HKSCS-2008 PUA mapping 補
	// 來源是黑暗執行緒部落格 + PTT/巴哈姆特 等台灣社群常見補丁
};

// 檢查單一字元是否能安全用 Big5 編碼（round-trip 不變）
function canEncodeInBig5(char) {
    try {
        const bytes = iconv.encode(char, "big5");
        const back = iconv.decode(bytes, "big5");
        return back === char;
    } catch {
        return false;
    }
}


let OpenCCLib

window.onload=()=>{
OpenCCLib=window.OpenCC
}

/* 簡易的繁簡轉換 */
function convert(from,to){
const input=document.getElementById("input").value
if(!input) return
const converter=OpenCCLib.Converter({from:from,to:to})
const result=converter(input)
document.getElementById("output").value=result
}


// GBK 被當 Big5 解讀顯示亂碼 → 修復成正確簡體
function fixGbkDisplayedAsBig5() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const useCustomFix = document.getElementById("useCustomFixMap").checked;

    let output = '';

    if (!useCustomFix) {
        // 沒勾選 → 簡單直接轉
        try {
            const bytes = iconv.encode(input, "big5");
            output = iconv.decode(bytes, "gbk");
        } catch {
            output = input; // 失敗就保留原樣
        }
    } else {
        // 勾選 → 分段 + 逐段處理 + 套修復表
        const segments = [];
        let current = '';
        let currentEncodable = true;

        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const encodable = canEncodeInBig5(char);
            if (encodable !== currentEncodable && current) {
                segments.push({ text: current, encodable: currentEncodable });
                current = '';
            }
            current += char;
            currentEncodable = encodable;
        }
        if (current) {
            segments.push({ text: current, encodable: currentEncodable });
        }

        for (const seg of segments) {
            if (seg.encodable) {
                try {
                    const bytes = iconv.encode(seg.text, "big5");
                    output += iconv.decode(bytes, "gbk");
                } catch {
                    output += seg.text;
                }
            } else {
                // 不可編碼區段 → 套修復表
                let fixed = '';
                for (const char of seg.text) {
                    fixed += puaFixMap[char] || char;
                }
                output += fixed;
            }
        }
    }

    document.getElementById("output").value = output;
}


// 亂碼修復 - Big5 被當成 GBK 解讀後顯示亂碼
function fixBig5DisplayedAsGbk() {
    const input = document.getElementById("input").value.trim();
    if (!input) return;

    const useCustomFix = document.getElementById("useCustomFixMap").checked;

    let output = '';

    if (!useCustomFix) {
        // 沒勾選 → 簡單直接轉
        try {
            const bytes = iconv.encode(input, "gbk");
            output = iconv.decode(bytes, "big5");
        } catch {
            output = input;
        }
    } else {
        // 勾選 → 分段 + 逐段處理 + 套修復表
        const segments = [];
        let current = '';
        let currentEncodable = true;

        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const encodable = canEncodeInBig5(char);
            if (encodable !== currentEncodable && current) {
                segments.push({ text: current, encodable: currentEncodable });
                current = '';
            }
            current += char;
            currentEncodable = encodable;
        }
        if (current) {
            segments.push({ text: current, encodable: currentEncodable });
        }

        for (const seg of segments) {
            if (seg.encodable) {
                try {
                    const bytes = iconv.encode(seg.text, "gbk");
                    output += iconv.decode(bytes, "big5");
                } catch {
                    output += seg.text;
                }
            } else {
                // 不可編碼區段 → 套修復表
                let fixed = '';
                for (const char of seg.text) {
                    fixed += puaFixMap[char] || char;
                }
                output += fixed;
            }
        }
    }

    document.getElementById("output").value = output;
}


/* 複製 */
function copyOutputToClipboard() {
    const outputEl = document.getElementById("output");
    const text = outputEl.value.trim();
    
    if (!text) return;
    
    const btn = event.target;           // 取得被點的按鈕
    const originalText = btn.textContent;
    
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "已複製到剪貼簿 ✓";
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
        }, 1200);
    }).catch(() => {
        btn.textContent = "複製失敗";
        setTimeout(() => { btn.textContent = originalText; }, 2000);
    });
}


// 清空輸入框
function clearInput() {
    document.getElementById("input").value = "";
}

// 清空輸出框
function clearOutput() {
    document.getElementById("output").value = "";
}

// 輸入與輸出內容互換
function swapInputOutput() {
    const inputEl  = document.getElementById("input");
    const outputEl = document.getElementById("output");
    
    const temp = inputEl.value;
    inputEl.value  = outputEl.value;
    outputEl.value = temp;
}

// 從剪貼簿貼到輸入框（支援附加 / 覆蓋）
function pasteFromClipboard() {
    const inputEl = document.getElementById("input");
    const appendMode = document.getElementById("pasteAppend").checked;
    const btn = event.target;  // 用來做反饋
    const originalText = btn.textContent;

    // 先試舊的 execCommand 方式（觸發確認彈窗的機率較低）
    const tempTextarea = document.createElement("textarea");
    tempTextarea.style.position = "fixed";
    tempTextarea.style.opacity = "0";
    tempTextarea.style.left = "-9999px";
    document.body.appendChild(tempTextarea);

    tempTextarea.focus();
    tempTextarea.select();

    let pastedText = "";
    let success = false;

    try {
        success = document.execCommand("paste");
        if (success) {
            pastedText = tempTextarea.value.trim();
        }
    } catch (e) {
        console.warn("execCommand paste 失敗:", e);
    }

    document.body.removeChild(tempTextarea);

    if (success && pastedText) {
        // 成功了，直接處理
        applyPastedText(pastedText, inputEl, appendMode, btn, originalText);
        return;
    }

    // 如果 execCommand 失敗 → fallback 到 Clipboard API
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText()
            .then(text => {
                if (text.trim()) {
                    applyPastedText(text.trim(), inputEl, appendMode, btn, originalText);
                } else {
                    showFeedback(btn, "剪貼簿空的", originalText);
                }
            })
            .catch(err => {
                console.error("Clipboard API 失敗:", err);
                showFeedback(btn, "貼上失敗", originalText);
                alert("無法自動讀取剪貼簿，請用 Ctrl+V 手動貼上。\n（瀏覽器安全限制，可能需點擊確認彈窗）");
            });
    } else {
        showFeedback(btn, "瀏覽器不支援", originalText);
        alert("你的瀏覽器不支援自動貼上，請用 Ctrl+V。");
    }
}

// 處理貼上文字 + 反饋
function applyPastedText(text, inputEl, appendMode, btn, originalText) {
    if (appendMode) {
        inputEl.value += (inputEl.value ? "\n" : "") + text;
    } else {
        inputEl.value = text;
    }

    inputEl.focus();
    inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);

    showFeedback(btn, "已貼上 ✓", originalText);
}

function showFeedback(btn, msg, originalText) {
    btn.textContent = msg;
    setTimeout(() => { btn.textContent = originalText; }, 1200);
}
